<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blinkit | India's Last Minute App</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Chote improvements taaki functionality smooth rahe */
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: white;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 1001;
            right: 0;
            border-radius: 8px;
            overflow: hidden;
        }
        .show { display: block; }
        .logout-link { color: #ff4d4d !important; cursor: pointer; }
        .cart-btn { transition: all 0.3s ease; }
    </style>
</head>
<body>

    <div id="authSection" class="auth-container">
        <div class="login-card">
            <h1 style="color: #F8CB46; font-size: 45px; margin: 0; font-family: sans-serif; font-weight: 900;">blinkit</h1>
            <p>India's last minute app</p>
            <form id="registrationForm">
                <input type="text" id="regName" placeholder="Full Name" required>
                <input type="email" id="regEmail" placeholder="Email Address" required>
                <input type="text" id="regMobile" placeholder="Mobile Number" required>
                <input type="text" id="regAddress" placeholder="Delivery Address (Gali, City, State)" required>
                <input type="password" id="regPass" placeholder="Set Password" required>
                <button type="submit" class="start-btn">Start Shopping</button>
            </form>
        </div>
    </div>

    <div id="storeSection" style="display: none;">
        <header class="main-header">
            <div class="header-left">
                <h1 class="logo" style="cursor: pointer;" onclick="location.reload()">blinkit</h1>
            <div class="delivery-info">
                    <b>Delivery in 16 minutes</b><br>
                    <span id="userAddressDisplay">Fetching address...</span>
                    <button id="locationBtn" class="location-btn" onclick="getLocation()" title="Use my current location">
                        <i class="fa fa-map-marker-alt"></i>
                    </button>
                </div>
            </div>

            <div class="header-center">
                <div class="search-box">
                    <i class="fa fa-search"></i>
                    <input type="text" id="mainSearch" placeholder='Search "butter", "milk" or "chips"'>
                </div>
            </div>

            <div class="header-right">
                <div class="account-menu" id="accountBtn" style="position: relative; cursor: pointer;">
                    <span>Account</span> <i class="fa fa-caret-down"></i>
                    <div class="dropdown-content" id="myDropdown">
                        <div class="user-id" style="padding: 10px; border-bottom: 1px solid #eee;">
                            My Account <br><small id="displayMobile" style="color: #0c831f;">User</small>
                        </div>
                        <a href="#" style="padding: 10px; display: block; text-decoration: none; color: black;"><i class="fa fa-box"></i> My Orders</a>
                        <hr style="margin: 0; border: none; border-top: 1px solid #eee;">
                        <a href="javascript:void(0)" onclick="logout()" class="logout-link" style="padding: 10px; display: block; text-decoration: none;">
                            <i class="fa fa-power-off"></i> Log Out
                        </a>
                    </div>
                </div>
                <button class="cart-btn" onclick="viewCart()">
                    <i class="fa fa-shopping-cart"></i> My Cart
                </button>
            </div>
        </header>

        <main class="store-container">
            <section class="hero-banner">
                <img src="https://cdn.grofers.com/cdn-cgi/image/f=auto,fit=scale-down,q=70,metadata=none,w=1080/layout-engine/2022-05/Group-33704.jpg" width="100%" style="border-radius: 12px; margin-top: 10px;">
            </section>

            <div class="promo-sections" style="display: flex; gap: 10px; margin-top: 15px;">
                <img src="https://cdn.grofers.com/cdn-cgi/image/f=auto,fit=scale-down,q=70,metadata=none,w=540/layout-engine/2023-07/pharmacy-WEB.jpg" width="32%" style="border-radius: 8px;">
                <img src="https://cdn.grofers.com/cdn-cgi/image/f=auto,fit=scale-down,q=70,metadata=none,w=540/layout-engine/2023-07/Pet-Care_WEB.jpg" width="32%" style="border-radius: 8px;">
                <img src="https://cdn.grofers.com/cdn-cgi/image/f=auto,fit=scale-down,q=70,metadata=none,w=540/layout-engine/2023-03/baby-care-WEB.jpg" width="32%" style="border-radius: 8px;">
            </div>

            <div class="category-container" style="display: flex; overflow-x: auto; gap: 15px; padding: 20px 0; background: #fff; border-bottom: 1px solid #eee; white-space: nowrap; scrollbar-width: none;">
                <div class="cat-item active" onclick="filterCategory('All')" style="cursor:pointer; text-align:center; min-width:80px;">
                    <img src="https://cdn-icons-png.flaticon.com/512/235/235252.png" style="width:40px; height:40px;"><br>
                    <span style="font-size:12px; font-weight:bold;">All</span>
                </div>
                <div class="cat-item" onclick="filterCategory('Dairy')" style="cursor:pointer; text-align:center; min-width:80px;">
                    <img src="https://cdn-icons-png.flaticon.com/512/3050/3050158.png" style="width:40px; height:40px;"><br>
                    <span style="font-size:12px;">Dairy</span>
                </div>
                <div class="cat-item" onclick="filterCategory('Snacks')" style="cursor:pointer; text-align:center; min-width:80px;">
                    <img src="https://cdn-icons-png.flaticon.com/512/2553/2553691.png" style="width:40px; height:40px;"><br>
                    <span style="font-size:12px;">Snacks</span>
                </div>
                <div class="cat-item" onclick="filterCategory('Electronics')" style="cursor:pointer; text-align:center; min-width:80px;">
                    <img src="https://cdn-icons-png.flaticon.com/512/3659/3659899.png" style="width:40px; height:40px;"><br>
                    <span style="font-size:12px;">Electronics</span>
                </div>
                <div class="cat-item" onclick="filterCategory('Beauty')" style="cursor:pointer; text-align:center; min-width:80px;">
                    <img src="https://cdn-icons-png.flaticon.com/512/3163/3163202.png" style="width:40px; height:40px;"><br>
                    <span style="font-size:12px;">Beauty</span>
                </div>
                <div class="cat-item" onclick="filterCategory('Decor')" style="cursor:pointer; text-align:center; min-width:80px;">
                    <img src="https://cdn-icons-png.flaticon.com/512/2303/2303902.png" style="width:40px; height:40px;"><br>
                    <span style="font-size:12px;">Decor</span>
                </div>
            </div>

            <h3 style="margin: 20px 0 10px 8%;">Fresh Vegetables & Fruits</h3>
            <div class="product-grid" id="productGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 20px; padding: 0 5%;"></div>
        </main>
    </div>

    

    <div id="cartBar" style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); width:90%; max-width:500px; display:none; z-index:1000;"></div>

    <script src="/js/style.js"></script>
</body>
</html>
